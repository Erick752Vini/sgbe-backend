<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SGBE</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    :root {
      --primary: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      --bg: #f4f7fe;
      --text: #2d3748;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .brand {
      background: var(--primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      font-size: 28px;
      margin-bottom: 10px;
    }

    h2 { color: var(--text); margin-bottom: 30px; font-weight: 500; }

    .form-group { text-align: left; margin-bottom: 20px; }

    label { display: block; margin-bottom: 8px; color: #718096; font-size: 14px; }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-sizing: border-box;
      outline: none;
      transition: 0.3s;
    }

    input:focus { border-color: #6a11cb; box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }

    .error-msg { color: #e53e3e; font-size: 14px; margin-top: 15px; display: none; }

    /* PARTE DO CADASTRO */
    .signup-link {
      margin-top: 25px;
      font-size: 14px;
      color: #718096;
    }

    .signup-link a {
      color: #2575fc;
      text-decoration: none;
      font-weight: 600;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center; align-items: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="brand">SGBE</div>
    <h2>Acesse sua conta</h2>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="exemplo@escola.com">
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••">
    </div>

    <button class="btn-login" onclick="fazerLogin()">Entrar no Sistema</button>
    
    <div class="signup-link">
      Não tem uma conta? <a href="#" onclick="abrirModal()">Cadastre-se aqui</a>
    </div>

    <div id="error" class="error-msg">E-mail ou senha incorretos.</div>
  </div>

  <!-- MODAL DE CADASTRO -->
  <div id="modalCadastro" class="modal">
    <div class="modal-content">
      <h3>Novo Cadastro</h3>
      <div class="form-group">
        <label>Nome Completo</label>
        <input type="text" id="reg-nome">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="reg-email">
      </div>
      <div class="form-group">
        <label>Matrícula</label>
        <input type="text" id="reg-matricula">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="reg-senha">
      </div>
      <button class="btn-login" onclick="salvarCadastro()">Finalizar Cadastro</button>
      <button class="btn-login" style="background: #cbd5e0; margin-top: 5px;" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>

  <script>
    // FUNÇÕES DO MODAL
    function abrirModal() { document.getElementById('modalCadastro').style.display = 'flex'; }
    function fecharModal() { document.getElementById('modalCadastro').style.display = 'none'; }

    // LOGIN
    async function fazerLogin() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const response = await fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await response.json();
      if (response.ok && data.token) {
        localStorage.setItem('token', data.token);
        window.location.href = 'index.html';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }

    // CADASTRO
    async function salvarCadastro() {
      const dados = {
        nome: document.getElementById('reg-nome').value,
        email: document.getElementById('reg-email').value,
        matricula: document.getElementById('reg-matricula').value,
        senha: document.getElementById('reg-senha').value,
        turma: 'Visitante' // Padrão inicial
      };

      const response = await fetch('http://localhost:3000/alunos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dados)
      });

      if (response.ok) {
        alert('Cadastro realizado! Agora faça o login.');
        fecharModal();
      } else {
        alert('Erro ao cadastrar. Verifique os dados.');
      }
    }
  </script>
</body>
</html>
